<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>www.study.ai · 学习作品棋盘</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC",
                   "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #f5f5f5;
      background:
        radial-gradient(circle at 10% 0%, #2b2f47 0, #090b15 50%, #020308 100%);
      display: flex;
      flex-direction: column;
    }

    /* 顶部：宇宙 + 太极意象 */
    header {
      padding: 26px 16px 10px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 0%, rgba(255,255,255,0.18) 0, transparent 55%),
        radial-gradient(circle at 80% 10%, rgba(150,180,255,0.25) 0, transparent 55%),
        radial-gradient(circle at 50% 120%, rgba(120,110,90,0.3) 0, transparent 60%);
      opacity: 0.35;
      pointer-events: none;
    }
    header .inner {
      position: relative;
      max-width: 960px;
      margin: 0 auto;
    }
    .title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    .taiji {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 30%, #fdfdfd 0, #fdfdfd 32%, transparent 33%),
        radial-gradient(circle at 70% 70%, #050509 0, #050509 32%, transparent 33%),
        linear-gradient(90deg, #fdfdfd 50%, #050509 50%);
      box-shadow: 0 0 12px rgba(255,255,255,0.6);
    }
    header h1 {
      font-size: 26px;
      letter-spacing: 6px;
      color: #fdfdfd;
    }
    header h1 span {
      border-bottom: 1px solid rgba(255,255,255,0.5);
      padding: 3px 8px;
    }
    header p.sub {
      margin-top: 10px;
      font-size: 14px;
      color: #e0e0e0;
    }
    header p.note {
      margin-top: 4px;
      font-size: 12px;
      color: #aaaaaa;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px 16px 28px;
    }

    .board-wrapper {
      max-width: 960px;
      width: 100%;
    }
    .board {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      aspect-ratio: 4 / 3;
      border-radius: 18px;
      padding: 16px;
      background:
        radial-gradient(circle at 10% 0%, rgba(255,255,255,0.12) 0, transparent 55%),
        radial-gradient(circle at 80% 100%, rgba(120,120,160,0.3) 0, transparent 60%),
        linear-gradient(135deg, rgba(255,255,255,0.06), rgba(0,0,0,0.6));
      box-shadow:
        0 0 40px rgba(0,0,0,0.9),
        0 0 120px rgba(80,100,180,0.5);
      position: relative;
      overflow: hidden;
    }
    .board::before {
      content: "";
      position: absolute;
      inset: 6%;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.2);
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.06) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: calc(100% / 4) calc(100% / 3);
      opacity: 0.6;
      pointer-events: none;
    }

    .board-grid {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 0;
      padding: 8%;
    }

    .cell {
      position: relative;
      padding: 6px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #f4f4f4;
      z-index: 1;
    }
    .cell::before {
      content: "";
      position: absolute;
      inset: 6px;
      border-radius: 10px;
      background: radial-gradient(circle at 30% 0%, rgba(255,255,255,0.14) 0, transparent 60%);
      opacity: 0;
      transition: opacity 0.2s ease-out, transform 0.2s ease-out;
      transform: scale(0.98);
    }

    .cell-main {
      cursor: default;
    }
    .cell-link {
      cursor: pointer;
    }

    .cell-title {
      font-size: 14px;
      letter-spacing: 3px;
      margin-bottom: 4px;
    }
    .cell-sub {
      font-size: 11px;
      color: #dddddd;
      opacity: 0.85;
    }

    .cell-link a {
      text-decoration: none;
      color: inherit;
      display: block;
      width: 100%;
      height: 100%;
    }

    .cell-link:hover::before {
      opacity: 1;
      transform: scale(1);
    }
    .cell-link:hover .cell-title {
      text-shadow: 0 0 6px rgba(255,255,255,0.9);
    }

    /* 预留格子：星辰 / 空白 / 未来作品 */
    .cell-muted .cell-title {
      color: #b0b5d0;
      opacity: 0.7;
    }
    .cell-muted .cell-sub {
      color: #8b8fb0;
      opacity: 0.7;
    }

    footer {
      padding: 6px 16px 14px;
      text-align: center;
      font-size: 11px;
      color: #b0b0b0;
    }

    @media (max-width: 640px) {
      header { padding-top: 18px; }
      header h1 { font-size: 20px; letter-spacing: 4px; }
      .board { border-radius: 16px; padding: 10px; }
      .board-grid { padding: 10%; }
      .cell-title { font-size: 12px; }
      .cell-sub { font-size: 10px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="inner">
      <div class="title-row">
        <div class="taiji"></div>
        <h1><span>www.study.ai</span></h1>
      </div>
      <p class="sub">宇宙棋盘里的 AI 学习作品合集。</p>
      <p class="note">点击棋盘上的格子，进入不同作品世界。</p>
    </div>
  </header>

  <main>
    <div class="board-wrapper">
      <div class="board">
        <div class="board-grid">
          <!-- 第一行 -->
          <div class="cell cell-muted">
            <div class="cell-title">宇宙 · 星尘</div>
            <div class="cell-sub">预留作品位</div>
          </div>
          <div class="cell cell-link">
            <a href="ai-avatar.html">
              <div class="cell-title">AI 分身</div>
              <div class="cell-sub">记住「我是谁」的助手</div>
            </a>
          </div>
          <div class="cell cell-link">
            <a href="daofashuqi.html">
              <div class="cell-title">道法术器拆解</div>
              <div class="cell-sub">把一锅粥拆成结构化知识</div>
            </a>
          </div>
          <div class="cell cell-muted">
            <div class="cell-title">星图标记</div>
            <div class="cell-sub">未来作品入口</div>
          </div>

          <!-- 第二行 -->
          <div class="cell cell-muted">
            <div class="cell-title">蓝桥杯</div>
            <div class="cell-sub">敬请期待</div>
          </div>
          <div class="cell cell-muted">
            <div class="cell-title">专业课 · AI 辅助</div>
            <div class="cell-sub">预留位</div>
          </div>
          <div class="cell cell-muted">
            <div class="cell-title">竞赛项目</div>
            <div class="cell-sub">预留位</div>
          </div>
          <div class="cell cell-muted">
            <div class="cell-title">科研代码拆解</div>
            <div class="cell-sub">预留位</div>
          </div>

          <!-- 第三行 -->
          <div class="cell cell-muted">
            <div class="cell-title">山林 · 隐居</div>
            <div class="cell-sub">安静的思考角落</div>
          </div>
          <div class="cell cell-muted">
            <div class="cell-title">方法论合集</div>
            <div class="cell-sub">之后可以接 skill 说明</div>
          </div>
          <div class="cell cell-muted">
            <div class="cell-title">作品集入口</div>
            <div class="cell-sub">预留</div>
          </div>
          <div class="cell cell-muted">
            <div class="cell-title">空白</div>
            <div class="cell-sub">留给未来的自己</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    学习记录 · 非商业展示用
  </footer>
</body>
</html>
